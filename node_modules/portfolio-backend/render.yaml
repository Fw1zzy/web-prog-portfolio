services:
  - type: web
    name: portfolio-backend
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAIL
        value: admin@portfolio.app
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULLNAME
        value: Admin
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
      - key: EMAIL_SERVICE
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
